<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" 
      lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} ?: 'Castores Inventario'">Castores Inventario</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background-color: #1a5490;
        }
        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
        }
        main {
            flex: 1;
            padding: 2rem 0;
        }
        footer {
            background-color: #f8f9fa;
            border-top: 1px solid #dee2e6;
            padding: 2rem 0;
            margin-top: 3rem;
        }
        .user-info {
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/home">
                <i class="bi bi-box2"></i> Castores Inventario
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                        <a class="nav-link" href="/inventario">Inventario</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                        <a class="nav-link" href="/productos/nuevo">Nuevo Producto</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                        <a class="nav-link" href="/inventario/entrada">Entradas</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                        <a class="nav-link" href="/movimientos">Historial</a>
                    </li>

                    <li class="nav-item" sec:authorize="hasRole('ALMACENISTA')">
                        <a class="nav-link" href="/inventario">Inventario</a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ALMACENISTA')">
                        <a class="nav-link" href="/inventario/salida">Salidas</a>
                    </li>

                    <li class="nav-item user-info ms-3">
                        <span sec:authentication="name"></span>
                    </li>
                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm ms-2">
                                <i class="bi bi-box-arrow-right"></i> Cerrar Sesión
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main class="container-fluid">
        <div th:replace="~{this :: content}"></div>
    </main>
    <footer class="text-center text-muted">
        <p class="m-0">&copy; 2026 Grupo Castores. Todos los derechos reservados.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
