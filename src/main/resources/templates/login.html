<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Castores Inventario - Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            background: linear-gradient(135deg, #1a5490 0%, #2a73b4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            border: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }
        .card-header {
            background: linear-gradient(135deg, #1a5490 0%, #2a73b4 100%);
            color: white;
            border-radius: 10px 10px 0 0;
            padding: 2rem 0;
            text-align: center;
        }
        .card-header h1 {
            margin: 0;
            font-size: 1.8rem;
        }
        .form-control:focus {
            border-color: #1a5490;
            box-shadow: 0 0 0 0.2rem rgba(26, 84, 144, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #1a5490 0%, #2a73b4 100%);
            border: none;
            color: white;
        }
        .btn-login:hover {
            background: linear-gradient(135deg, #0f3d6b 0%, #1a5490 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <h1><i class="bi bi-box2"></i> Castores Inventario</h1>
            </div>
            <div class="card-body p-4">
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="bi bi-exclamation-circle"></i> Correo o contraseña incorrectos
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="bi bi-check-circle"></i> Sesión cerrada correctamente
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/login}" method="post" class="needs-validation">
                    <div class="mb-3">
                        <label for="username" class="form-label"><i class="bi bi-envelope"></i> Correo Electrónico</label>
                        <input type="email" class="form-control" id="username" name="username" placeholder="tu@email.com" required>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label"><i class="bi bi-lock"></i> Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Contraseña" required>
                    </div>

                    <button type="submit" class="btn btn-login w-100 btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                    </button>
                </form>

                <hr class="my-4">
                <p class="text-muted text-center small mb-0">
                    <i class="bi bi-info-circle"></i> Usuarios de prueba:<br>
                    admin@castores.com / admin123<br>
                    almacen@castores.com / almacen123
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
